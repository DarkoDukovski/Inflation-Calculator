<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description"
		content="Calculate the future purchasing power of your money with this interactive inflation calculator. See how inflation affects your savings over time.">
	<title>Inflation Calculator - Calculate Future Purchasing Power</title>
	<link rel="icon" type="image/svg+xml"
		href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='22 7 13.5 15.5 8.5 10.5 2 17'/%3E%3Cpolyline points='16 7 22 7 22 13'/%3E%3C/svg%3E">
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
	<main class="background-overlay">
		<header class="header">
			<h1>Inflation Calculator</h1>
			<p class="subtitle">Calculate the future purchasing power of your money</p>
		</header>
		<div class="container">
			<div class="calculator-wrapper">
				<div class="calculator-left">
					<form id="calculatorForm" novalidate>
						<div class="input-group rate-group">
							<label for="inflationRate">
								<span class="label-icon" aria-hidden="true" style="display: flex;">
									<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
										fill="none" stroke="#f093fb" stroke-width="2" stroke-linecap="round"
										stroke-linejoin="round">
										<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
										<polyline points="16 7 22 7 22 13"></polyline>
									</svg>
								</span>
								Rate of Inflation
							</label>
							<div class="input-wrapper">
								<input type="number" min="0.1" id="inflationRate" placeholder="e.g., 3.5" step="0.1"
									required>
								<span class="input-suffix" aria-hidden="true">%</span>
							</div>
						</div>

						<div class="input-group">
							<label for="money">
								<span class="label-icon" aria-hidden="true" style="display: flex;">
									<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
										fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round"
										stroke-linejoin="round">
										<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" />
										<path d="M3 5v14a2 2 0 0 0 2 2h16v-5" />
										<path d="M18 12a2 2 0 0 0 0 4h4v-4Z" />
									</svg>
								</span>
								Current Amount
							</label>
							<div class="input-wrapper-with-select">
								<input type="number" min="1" id="money" placeholder="e.g., 1000" step="0.01" required>
								<select id="currency" class="currency-select" aria-label="Currency">
									<option value="€">€</option>
									<option value="$">$</option>
									<option value="MKD">MKD</option>
									<option value="CHF">CHF</option>
								</select>
							</div>
						</div>

						<div class="input-group">
							<label for="years">
								<span class="label-icon" aria-hidden="true" style="display: flex;">
									<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
										fill="none" stroke="#f093fb" stroke-width="2" stroke-linecap="round"
										stroke-linejoin="round">
										<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
										<line x1="16" y1="2" x2="16" y2="6"></line>
										<line x1="8" y1="2" x2="8" y2="6"></line>
										<line x1="3" y1="10" x2="21" y2="10"></line>
									</svg>
								</span>
								Number of Years
							</label>
							<div class="input-wrapper">
								<input type="number" min="1" id="years" placeholder="e.g., 10" step="1" required>
								<span class="input-suffix" aria-hidden="true">years</span>
							</div>
						</div>

						<button type="submit" id="calculateBtn">
							<span class="button-text">Calculate</span>
							<span class="button-icon" aria-hidden="true">→</span>
						</button>
					</form>
				</div>
				<div class="calculator-right">
					<div class="result-container" id="result" role="status" aria-live="polite"></div>
					<div class="chart-container" id="chartContainer"></div>
				</div>
			</div>
		</div>
	</main>
	<script src="script.js"></script>
</body>

</html>
