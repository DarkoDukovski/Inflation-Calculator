<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Calculate the future purchasing power of your money with this interactive inflation calculator. See how inflation affects your savings over time.">
	<title>Inflation Calculator - Calculate Future Purchasing Power</title>
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
	<main class="background-overlay">
		<header class="header">
			<h1>Inflation Calculator</h1>
			<p class="subtitle">Calculate the future purchasing power of your money</p>
		</header>
		<div class="container">
			<div class="calculator-wrapper">
				<div class="calculator-left">
					<form id="calculatorForm" novalidate>
						<div class="input-group rate-group">
							<label for="inflationRate">
								<span class="label-icon" aria-hidden="true">📈</span>
								Rate of Inflation
							</label>
							<div class="input-wrapper">
								<input type="number" min="0.1" id="inflationRate" placeholder="e.g., 3.5" step="0.1" required>
								<span class="input-suffix" aria-hidden="true">%</span>
							</div>
						</div>
						
						<div class="input-group">
							<label for="money">
								<span class="label-icon" aria-hidden="true">💰</span>
								Current Amount
							</label>
							<div class="input-wrapper-with-select">
								<input type="number" min="1" id="money" placeholder="e.g., 1000" step="0.01" required>
								<select id="currency" class="currency-select" aria-label="Currency">
									<option value="€">€</option>
									<option value="$">$</option>
									<option value="MKD">MKD</option>
									<option value="CHF">CHF</option>
								</select>
							</div>
						</div>
						
						<div class="input-group">
							<label for="years">
								<span class="label-icon" aria-hidden="true">📅</span>
								Number of Years
							</label>
							<div class="input-wrapper">
								<input type="number" min="1" id="years" placeholder="e.g., 10" step="1" required>
								<span class="input-suffix" aria-hidden="true">years</span>
							</div>
						</div>
						
						<button type="submit" id="calculateBtn">
							<span class="button-text">Calculate</span>
							<span class="button-icon" aria-hidden="true">→</span>
						</button>
					</form>
				</div>
				<div class="calculator-right">
					<div class="result-container" id="result" role="status" aria-live="polite"></div>
					<div class="chart-container" id="chartContainer"></div>
				</div>
			</div>
		</div>
	</main>
	<script src="script.js"></script>
</body>
</html>
